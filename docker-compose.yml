services:
  dashboard:
    image: nginx:alpine
    container_name: opencode-tutorial
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - opencode-net

networks:
  opencode-net:
    driver: bridge
